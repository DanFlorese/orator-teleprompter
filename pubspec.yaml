name: orator_teleprompter
description: "Professional Teleprompter App for creators."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  google_fonts: ^6.2.1
  image_picker: ^1.2.1
  
  # --- INFRAESTRUCTURA DE VIDEO Y CÁMARA ---
  camera: ^0.11.0
  video_player: ^2.8.1
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.1 

  # --- SEGURIDAD Y MONETIZACIÓN ---
  google_mobile_ads: ^5.1.0
  screen_protector: ^1.0.1
  gal: ^2.1.3 
  permission_handler: ^11.3.1 
  purchases_flutter: ^9.10.6 # RevenueCat
  flutter_dotenv: ^6.0.0 # - Para manejo de variables de entorno

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - .env # - Importante: carga el archivo de llaves
    - assets/images/logo_icon.png
    - assets/images/logo.png
    - assets/images/logo_splash.png

# Configuración de Icono de App
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_icon.png" 
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_icon.png"

# Configuración de Pantalla de Carga
flutter_native_splash:
  color: "#000000"
  image: "assets/images/logo_splash.png" 
  android_12:
    image: "assets/images/logo_splash.png" 
    icon_background_color: "#000000"
  web: false